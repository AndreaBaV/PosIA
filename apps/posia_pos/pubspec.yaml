name: posia_pos
description: Aplicacion de caja POSIA para Windows, iOS y Android.
publish_to: none
version: 1.0.0+5

environment:
  sdk: ^3.11.0
  flutter: ">=3.41.0"

dependencies:
  # 7.1.x usa NWPath.isUltraConstrained (SDK iOS reciente); rompe archive en CI.
  connectivity_plus: ">=7.0.0 <7.1.0"
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.0.3
  path_provider: ^2.1.5
  file_picker: ^10.2.0
  printing: ^5.14.2
  permission_handler: ^12.0.1
  url_launcher: ^6.3.1
  geolocator: ^13.0.2
  local_auth: ^2.3.0
  pdf: ^3.11.3
  barcode: ^2.2.9
  speech_to_text: ^7.0.0
  posia_core:
    path: ../../packages/posia_core
  posia_database:
    path: ../../packages/posia_database
  posia_hardware:
    path: ../../packages/posia_hardware
  posia_inventory:
    path: ../../packages/posia_inventory
  posia_licensing:
    path: ../../packages/posia_licensing
  posia_module_butcher:
    path: ../../packages/posia_module_butcher
  posia_module_pharmacy:
    path: ../../packages/posia_module_pharmacy
  posia_pricing:
    path: ../../packages/posia_pricing
  posia_sync:
    path: ../../packages/posia_sync
  posia_ui:
    path: ../../packages/posia_ui
  posia_voice:
    path: ../../packages/posia_voice
  flutter_secure_storage: ^10.3.1

dev_dependencies:
  flutter_launcher_icons: ^0.14.3
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.4
  flutter_test:
    sdk: flutter

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/app_icon.png
  adaptive_icon_background: "#2E7D32"
  adaptive_icon_foreground: assets/branding/app_icon.png

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/branding/app_icon.png
  android_12:
    color: "#FFFFFF"
    image: assets/branding/app_icon.png

flutter:
  uses-material-design: true
  assets:
    - assets/branding/app_icon.png
