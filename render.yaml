# Blueprint Render — debe estar en la RAÍZ del repo (junto a apps/, packages/, server/).
services:
  - type: web
    name: posia-sync-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /v1/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: API_KEY
        sync: false
      - key: POSIA_ENV
        value: production
      - key: PORT
        value: "8080"
