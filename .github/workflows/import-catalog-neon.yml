name: Import catalog to Neon

on:
  workflow_dispatch:
    inputs:
      archivo:
        description: Ruta del XLSX dentro del repo
        required: true
        default: apps/posia_pos/hola2.xlsx
      modo:
        description: 'catalogo (hojas 1-2) | granel (hoja Granel) | ambos'
        required: true
        default: granel
        type: choice
        options:
          - granel
          - catalogo
          - ambos
      hoja_granel:
        description: Nombre de la hoja granel
        required: true
        default: Granel
  push:
    branches: [main]
    paths:
      - apps/posia_pos/hola2.xlsx
      - apps/posia_pos/hola.xlsx
      - apps/posia_pos/plantillas/plantilla_productos_granel.csv
      - scripts/importar_hola2_neon.py
      - scripts/importar_granel_neon.py
      - .github/workflows/import-catalog-neon.yml

permissions:
  contents: read

jobs:
  importar:
    name: Importar productos a Neon
    runs-on: ubuntu-latest
    environment: arturo-tienda-de-abarrotes
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Importar hoja al hub
        env:
          POSIA_HUB_URL: ${{ secrets.POSIA_HUB_URL }}
          POSIA_HUB_API_KEY: ${{ secrets.POSIA_HUB_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$POSIA_HUB_URL" ] || [ -z "$POSIA_HUB_API_KEY" ]; then
            echo "::error::POSIA_HUB_URL y POSIA_HUB_API_KEY son obligatorios"
            exit 1
          fi
          ARCHIVO="${{ github.event.inputs.archivo }}"
          MODO="${{ github.event.inputs.modo }}"
          HOJA="${{ github.event.inputs.hoja_granel }}"
          if [ -z "$ARCHIVO" ]; then
            ARCHIVO="apps/posia_pos/hola2.xlsx"
          fi
          if [ -z "$MODO" ]; then
            MODO="granel"
          fi
          if [ -z "$HOJA" ]; then
            HOJA="Granel"
          fi
          set -e
          if [ "$MODO" = "catalogo" ] || [ "$MODO" = "ambos" ]; then
            echo "Importando catalogo (script hola2)..."
            python3 scripts/importar_hola2_neon.py "$ARCHIVO"
          fi
          if [ "$MODO" = "granel" ] || [ "$MODO" = "ambos" ]; then
            echo "Importando granel (hoja $HOJA)..."
            python3 scripts/importar_granel_neon.py "$ARCHIVO" --hoja "$HOJA"
          fi
