name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.41.5"

jobs:
  packages:
    name: Flutter packages
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - packages/posia_core
          - packages/posia_database
          - packages/posia_sync
          - apps/posia_pos
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Pub get
        working-directory: ${{ matrix.package }}
        run: flutter pub get

      - name: Analyze
        working-directory: ${{ matrix.package }}
        run: dart analyze .

      - name: Test
        working-directory: ${{ matrix.package }}
        run: flutter test

  platform:
    name: Tenant registry
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Pub get
        working-directory: platform/tenant_registry
        run: flutter pub get

      - name: Analyze
        working-directory: platform/tenant_registry
        run: dart analyze .

      - name: Test
        working-directory: platform/tenant_registry
        run: flutter test

  server:
    name: Sync API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server/sync_api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Install dependencies
        run: dart pub get

      - name: Analyze
        run: dart analyze .

      - name: Test
        run: dart test
