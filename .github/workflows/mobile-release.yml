name: Mobile Release

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Plataforma a compilar
        required: true
        default: all
        type: choice
        options:
          - all
          - android
          - ios
  push:
    tags:
      - mobile-v*

concurrency:
  group: mobile-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  FLUTTER_VERSION: "3.41.5"
  JAVA_VERSION: "17"
  APP_DIR: apps/posia_pos

jobs:
  android:
    name: Android AAB
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' ||
      github.event.inputs.platform == 'all' ||
      github.event.inputs.platform == 'android'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: ${{ env.APP_DIR }}
        run: |
          flutter pub get
          dart run flutter_launcher_icons
          dart run flutter_native_splash:create

      - name: Configure Android signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            if [ "${{ github.event_name }}" = "push" ]; then
              echo "::error::ANDROID_KEYSTORE_BASE64 requerido para releases con tag."
              exit 1
            fi
            echo "::warning::ANDROID_KEYSTORE_BASE64 no configurado. El AAB usara firma debug."
            exit 0
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > ${{ env.APP_DIR }}/android/posia-release.keystore
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=../posia-release.keystore\n' \
            "$ANDROID_KEYSTORE_PASSWORD" "$ANDROID_KEY_PASSWORD" "$ANDROID_KEY_ALIAS" \
            > ${{ env.APP_DIR }}/android/key.properties

      - name: Build App Bundle
        working-directory: ${{ env.APP_DIR }}
        env:
          POSIA_HUB_URL: ${{ secrets.POSIA_HUB_URL }}
          POSIA_HUB_API_KEY: ${{ secrets.POSIA_HUB_API_KEY }}
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            if [ -z "$POSIA_HUB_URL" ] || [ -z "$POSIA_HUB_API_KEY" ]; then
              echo "::error::POSIA_HUB_URL y POSIA_HUB_API_KEY son obligatorios en releases con tag."
              exit 1
            fi
          fi
          ARGS=""
          [ -n "$POSIA_HUB_URL" ] && ARGS="$ARGS --dart-define=POSIA_HUB_URL=$POSIA_HUB_URL"
          [ -n "$POSIA_HUB_API_KEY" ] && ARGS="$ARGS --dart-define=POSIA_HUB_API_KEY=$POSIA_HUB_API_KEY"
          flutter build appbundle --release $ARGS

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: posia-android-aab
          path: ${{ env.APP_DIR }}/build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 30

      - name: Build APK (sideload)
        working-directory: ${{ env.APP_DIR }}
        env:
          POSIA_HUB_URL: ${{ secrets.POSIA_HUB_URL }}
          POSIA_HUB_API_KEY: ${{ secrets.POSIA_HUB_API_KEY }}
        run: |
          ARGS=""
          [ -n "$POSIA_HUB_URL" ] && ARGS="$ARGS --dart-define=POSIA_HUB_URL=$POSIA_HUB_URL"
          [ -n "$POSIA_HUB_API_KEY" ] && ARGS="$ARGS --dart-define=POSIA_HUB_API_KEY=$POSIA_HUB_API_KEY"
          flutter build apk --release $ARGS

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: posia-android-apk
          path: ${{ env.APP_DIR }}/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 30

  ios:
    name: iOS IPA
    runs-on: macos-26
    if: >-
      github.event_name == 'push' ||
      github.event.inputs.platform == 'all' ||
      github.event.inputs.platform == 'ios'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26 (iOS 26 SDK)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.6'

      - name: Prepare Xcode 26 (iOS SDK)
        run: |
          set -euo pipefail
          xcodebuild -version
          sudo xcodebuild -runFirstLaunch
          xcrun simctl list > /dev/null 2>&1 || true
          set +e
          xcodebuild -downloadPlatform iOS -architectureVariant universal
          code=$?
          if [ "$code" -ne 0 ] && [ "$code" -ne 70 ]; then
            echo "::error::downloadPlatform iOS fallo con codigo $code"
            exit "$code"
          fi
          if [ "$code" -eq 70 ]; then
            echo "downloadPlatform: SDK ya incluido en Xcode (codigo 70), continuando"
          fi
          set -e
          echo "--- SDKs disponibles ---"
          xcodebuild -showsdks
          if ! xcodebuild -showsdks | grep -q 'iphoneos26'; then
            echo "::error::iphoneos26 SDK no disponible tras preparar Xcode"
            exit 1
          fi

      - name: Verify iOS signing secrets
        id: signing
        env:
          IOS_CERT: ${{ secrets.IOS_DIST_CERTIFICATE_BASE64 }}
          IOS_PROFILE: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
          IOS_CERT_PASSWORD: ${{ secrets.IOS_DIST_CERTIFICATE_PASSWORD }}
          IOS_PROFILE_NAME: ${{ secrets.IOS_PROVISION_PROFILE_NAME }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "$IOS_CERT" ] || [ -z "$IOS_PROFILE" ] || [ -z "$IOS_CERT_PASSWORD" ] || \
             [ -z "$IOS_PROFILE_NAME" ] || [ -z "$APPLE_TEAM_ID" ]; then
            if [ "${{ github.event_name }}" = "push" ]; then
              echo "::error::Secrets iOS incompletos para releases con tag."
              exit 1
            fi
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Secrets iOS incompletos. Requeridos: IOS_DIST_CERTIFICATE_BASE64, IOS_DIST_CERTIFICATE_PASSWORD, IOS_PROVISION_PROFILE_BASE64, IOS_PROVISION_PROFILE_NAME, APPLE_TEAM_ID."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Flutter
        if: steps.signing.outputs.configured == 'true'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        if: steps.signing.outputs.configured == 'true'
        working-directory: ${{ env.APP_DIR }}
        run: |
          flutter pub get
          dart run flutter_launcher_icons
          dart run flutter_native_splash:create

      - name: Import Apple Distribution certificate
        if: steps.signing.outputs.configured == 'true'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.IOS_DIST_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.IOS_DIST_CERTIFICATE_PASSWORD }}
          keychain: posia-build

      - name: Install provisioning profile and signing xcconfig
        if: steps.signing.outputs.configured == 'true'
        env:
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          IOS_PROVISION_PROFILE_NAME: ${{ secrets.IOS_PROVISION_PROFILE_NAME }}
        run: |
          set -euo pipefail
          PP_PATH="$RUNNER_TEMP/build_pp.mobileprovision"
          tr -d ' \n\r' <<< "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o "$PP_PATH"

          PP_UUID=$(security cms -D -i "$PP_PATH" | plutil -extract UUID raw -)
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PP_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/${PP_UUID}.mobileprovision"

          SIGNING="${{ env.APP_DIR }}/ios/Flutter/Signing.xcconfig"
          {
            echo "DEVELOPMENT_TEAM=${APPLE_TEAM_ID}"
            echo "CODE_SIGN_STYLE=Manual"
            echo "PROVISIONING_PROFILE_SPECIFIER=${IOS_PROVISION_PROFILE_NAME}"
            echo "CODE_SIGN_IDENTITY=Apple Distribution"
            echo "CODE_SIGN_IDENTITY[sdk=iphoneos*]=Apple Distribution"
          } > "$SIGNING"

          echo "Perfil instalado: ${IOS_PROVISION_PROFILE_NAME} (${PP_UUID})"
          echo "Identidades de firma:"
          security find-identity -v -p codesigning
          if ! security find-identity -v -p codesigning | grep -qE "Apple Distribution|iPhone Distribution"; then
            echo "::error::No hay certificado de distribucion valido. Regenera el .p12 con certificado Apple Distribution + clave privada."
            exit 1
          fi

      - name: Prepare ExportOptions.plist
        if: steps.signing.outputs.configured == 'true'
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          IOS_PROVISION_PROFILE_NAME: ${{ secrets.IOS_PROVISION_PROFILE_NAME }}
        run: |
          PLIST="${{ env.APP_DIR }}/ios/ExportOptions.plist"
          /usr/libexec/PlistBuddy -c "Set :teamID $APPLE_TEAM_ID" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :provisioningProfiles:com.posia.posiaPos $IOS_PROVISION_PROFILE_NAME" "$PLIST"

      - name: Build IPA
        if: steps.signing.outputs.configured == 'true'
        working-directory: ${{ env.APP_DIR }}
        env:
          POSIA_HUB_URL: ${{ secrets.POSIA_HUB_URL }}
          POSIA_HUB_API_KEY: ${{ secrets.POSIA_HUB_API_KEY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          IOS_PROVISION_PROFILE_NAME: ${{ secrets.IOS_PROVISION_PROFILE_NAME }}
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: Apple Distribution
          DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
          PROVISIONING_PROFILE_SPECIFIER: ${{ secrets.IOS_PROVISION_PROFILE_NAME }}
        run: |
          ARGS=""
          [ -n "$POSIA_HUB_URL" ] && ARGS="$ARGS --dart-define=POSIA_HUB_URL=$POSIA_HUB_URL"
          [ -n "$POSIA_HUB_API_KEY" ] && ARGS="$ARGS --dart-define=POSIA_HUB_API_KEY=$POSIA_HUB_API_KEY"
          flutter build ipa --release \
            --export-options-plist=ios/ExportOptions.plist \
            $ARGS
          IPA_DIR="build/ios/ipa"
          ls -la "$IPA_DIR"
          if [ ! -f "$IPA_DIR/AppStoreInfo.plist" ]; then
            echo "::error::No se genero AppStoreInfo.plist. Verifica generateAppStoreInformation en ios/ExportOptions.plist."
            exit 1
          fi

      - name: Upload IPA artifact
        if: steps.signing.outputs.configured == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: posia-ios-ipa
          path: |
            ${{ env.APP_DIR }}/build/ios/ipa/*.ipa
            ${{ env.APP_DIR }}/build/ios/ipa/AppStoreInfo.plist
          if-no-files-found: error
          retention-days: 30

      - name: iOS skipped summary
        if: steps.signing.outputs.configured != 'true'
        run: |
          echo "iOS no compilado: faltan secrets de firma Apple."
          echo "Ver docs/MANUAL_TECNICO.md seccion 11 (Publicacion movil)."

  github-release:
    name: GitHub Release
    needs: [android, ios]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/mobile-v')
    steps:
      - name: Download Android AAB
        uses: actions/download-artifact@v4
        with:
          name: posia-android-aab
          path: dist/android

      - name: Download Android APK
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: posia-android-apk
          path: dist/android

      - name: Download iOS IPA
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: posia-ios-ipa
          path: dist/ios

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/android/**
            dist/ios/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
